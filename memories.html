<script>
let isPlaying = false;

function toggleMusic() {
    const music = document.getElementById("bgMusic");
    const btn = document.querySelector(".music-btn");

    if (isPlaying) {
        music.pause();
        btn.innerText = "🎵 Play Music";
    } else {
        music.play();
        btn.innerText = "⏸ Pause Music";
    }

    isPlaying = !isPlaying;
}
</script>
